services:
  - type: web
    name: hancock-live-marketing-studio
    env: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: hancock-live-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_DATA_DIR
        value: /var/data
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        value: cjVigY5qzO86Huf0OWal
      - key: DAVE_ELEVENLABS_VOICE_ID
        value: ""
      - key: DAVE_ELEVENLABS_VOICE_NAME
        value: Jarvis 1.1 Voice
      - key: DAVE_ELEVENLABS_FALLBACK_VOICE_ID
        value: 6Lopt6P83rUsEz3TeM5C
      - key: DAVE_ELEVENLABS_FALLBACK_VOICE_NAME
        value: Jarvis
      - key: DAVE_ELEVENLABS_TTS_MODEL
        value: eleven_multilingual_v2
      - key: BOT_SCAN_INTERVAL_HOURS
        value: 24
      - key: BASE_URL
        value: https://hancock-live-marketing-studio.onrender.com
      - key: ALLOWED_EMAIL_DOMAIN
        value: hancockclaims.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Hancock Marketing Studio <studio@hancockclaims.com>
      - key: ADMIN_PASSWORD
        sync: false
