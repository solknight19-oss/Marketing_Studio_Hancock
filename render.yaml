services:
  - type: web
    name: hancock-live-marketing-studio
    env: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: hancock-live-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_DATA_DIR
        value: /var/data
      - key: HOST
        value: 0.0.0.0
      - key: SESSION_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: BASE_URL
        value: https://hancock-live-marketing-studio.onrender.com
      - key: ALLOWED_EMAIL_DOMAIN
        value: hancockclaims.com
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: Hancock Marketing Studio <studio@hancockclaims.com>
      - key: ADMIN_PASSWORD
        sync: false
