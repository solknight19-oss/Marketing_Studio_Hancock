<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chad — On-Brand Graphic Maker</title>
<style>
  :root{--navy:#0a2a45;--navy2:#103a5c;--blue:#2f6fbf;--blue2:#4f93e0;--mut:#9fb4c9}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(900px 600px at 75% 12%,#0e2c4a,#06121f);color:#eaf2fb;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .wrap{max-width:1080px;margin:0 auto;padding:24px 20px 50px;display:grid;grid-template-columns:330px 1fr;gap:24px;align-items:start}
  @media(max-width:820px){.wrap{grid-template-columns:1fr}}
  h1{font-size:18px;font-weight:850;margin:0 0 4px}.sub{font-size:12.5px;color:var(--mut);margin:0 0 16px;line-height:1.5}
  label{display:block;font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#7fa0c4;margin:14px 0 5px}
  input,textarea,select{width:100%;padding:10px 11px;border-radius:10px;border:1px solid #284a6b;background:#0d2740;color:#fff;font-size:14px;font-family:inherit}
  textarea{resize:vertical;min-height:64px}
  .row{display:flex;gap:9px}.row>*{flex:1}
  .btns{display:flex;gap:9px;flex-wrap:wrap;margin-top:18px}
  button{border:none;border-radius:10px;font-weight:800;font-size:13px;padding:11px 14px;cursor:pointer}
  .primary{background:var(--blue);color:#fff}.primary:hover{background:var(--blue2)}
  .ghost{background:rgba(255,255,255,.08);border:1px solid #284a6b;color:#dbeafe}.ghost:hover{background:rgba(255,255,255,.15)}
  .stage{display:flex;flex-direction:column;align-items:center;gap:12px}
  #prev{width:100%;max-width:540px;aspect-ratio:1/1;border-radius:14px;overflow:hidden;box-shadow:0 24px 60px rgba(4,12,22,.55)}
  #prev svg{width:100%;height:100%;display:block}
  .note{font-size:11.5px;color:var(--mut);line-height:1.5;margin-top:6px;max-width:540px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <h1>Chad — On-Brand Graphic Maker</h1>
    <p class="sub">Make shareable Hancock graphics (LinkedIn / social). Navy + your logo, no design tools. Type, preview, download. <a href="/studio" style="color:#8fc1ff">Back to Studio</a></p>
    <label>Style</label>
    <select id="style" onchange="render()">
      <option value="navy">Navy (default)</option>
      <option value="blue">Bright blue</option>
      <option value="storm">Storm (dark)</option>
    </select>
    <label>Eyebrow (small label)</label>
    <input id="kicker" value="LADDER ASSIST" oninput="render()">
    <label>Headline</label>
    <textarea id="headline" oninput="render()">Hail claims spike 48 hours after a storm.</textarea>
    <label>Big stat (optional)</label>
    <input id="stat" placeholder="e.g. 40%+" oninput="render()">
    <label>Subline</label>
    <input id="subline" value="Be inspection-ready before the surge." oninput="render()">
    <label>Footer tagline</label>
    <input id="tagline" value="Hancock Claims Consultants" oninput="render()">
    <div class="btns">
      <button class="primary" onclick="downloadPNG()">Download PNG</button>
      <button class="ghost" onclick="downloadSVG()">Download SVG</button>
      <button class="ghost" id="copyBtn" onclick="askChad()">Ask Chad for a headline</button>
    </div>
  </div>
  <div class="stage">
    <div id="prev"></div>
    <div class="note">1080&times;1080 social square. Chad uses Ryan Knight's playbook and the live Studio's private AI connection.</div>
  </div>
</div>

var STYLES={
  navy:{bg1:"#103a5c",bg2:"#0a2a45",accent:"#4f93e0",kicker:"#8fc1ff",stat:"#8fc1ff"},
  blue:{bg1:"#2f6fbf",bg2:"#163e74",accent:"#bfe0ff",kicker:"#dbeeff",stat:"#ffffff"},
  storm:{bg1:"#0e2236",bg2:"#05101c",accent:"#4f93e0",kicker:"#7fa9d6",stat:"#8fc1ff"}
};
function val(id){return document.getElementById(id).value;}
function esc(s){return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function wrap(text,max){var w=(text||"").split(/\s+/),lines=[],cur="";for(var i=0;i<w.length;i++){var t=cur?cur+" "+w[i]:w[i];if(t.length>max&&cur){lines.push(cur);cur=w[i];}else cur=t;}if(cur)lines.push(cur);return lines.slice(0,5);}
function buildSVG(){
  var s=STYLES[val("style")]||STYLES.navy;
  var kicker=esc(val("kicker")),head=val("headline"),stat=esc(val("stat")),sub=esc(val("subline")),tag=esc(val("tagline"));
  var lines=wrap(head,stat?16:20);
  var fs=lines.length>=4?72:lines.length===3?84:96;
  var startY=stat? 560 : 470;
  var headTspans=lines.map(function(l,i){return '<tspan x="90" dy="'+(i===0?0:fs+10)+'">'+esc(l)+'</tspan>';}).join("");
  var statBlock=stat? '<text x="90" y="430" font-family="Helvetica,Arial,sans-serif" font-size="190" font-weight="900" fill="'+s.stat+'">'+stat+'</text>' : '';
  return '<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">'
   +'<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+s.bg1+'"/><stop offset="1" stop-color="'+s.bg2+'"/></linearGradient></defs>'
   +'<rect width="1080" height="1080" fill="url(#bg)"/>'
   +'<rect width="1080" height="1080" fill="none"/>'
   +'<image x="84" y="74" width="150" height="150" preserveAspectRatio="xMinYMin meet" href="'+LOGO+'" xlink:href="'+LOGO+'"/>'
   +'<rect x="90" y="300" width="92" height="8" rx="4" fill="'+s.accent+'"/>'
   +'<text x="90" y="280" font-family="Helvetica,Arial,sans-serif" font-size="30" font-weight="800" letter-spacing="6" fill="'+s.kicker+'">'+kicker.toUpperCase()+'</text>'
   +statBlock
   +'<text x="90" y="'+startY+'" font-family="Georgia,\'Times New Roman\',serif" font-size="'+fs+'" font-weight="700" fill="#ffffff">'+headTspans+'</text>'
   +'<text x="90" y="'+(startY+lines.length*(fs+10)+30)+'" font-family="Helvetica,Arial,sans-serif" font-size="40" fill="#cfe0f4">'+sub+'</text>'
   +'<rect x="0" y="980" width="1080" height="100" fill="rgba(0,0,0,.18)"/>'
   +'<text x="90" y="1042" font-family="Helvetica,Arial,sans-serif" font-size="34" font-weight="800" fill="#ffffff">'+tag+'</text>'
   +'</svg>';
}
function render(){document.getElementById("prev").innerHTML=buildSVG();}
function downloadSVG(){var b=new Blob([buildSVG()],{type:"image/svg+xml"});var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="hancock-graphic.svg";a.click();}
function downloadPNG(){
  var svg=buildSVG();var img=new Image();
  img.onload=function(){var c=document.createElement("canvas");c.width=1080;c.height=1080;var x=c.getContext("2d");x.drawImage(img,0,0,1080,1080);
    var a=document.createElement("a");a.href=c.toDataURL("image/png");a.download="hancock-graphic.png";a.click();};
  img.onerror=function(){alert("Couldn't render PNG — try Download SVG.");};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
}
function askChad(){
  var btn=document.getElementById("copyBtn");btn.textContent="Asking Chad…";
  fetch("/api/bot",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:"Give me ONE punchy 8-12 word marketing headline for a Hancock ladder-assist social graphic. Use Ryan Knight's inspection philosophy. Reply with only the headline, no quotes."})})
    .then(function(r){return r.json();}).then(function(d){if(d.reply){document.getElementById("headline").value=d.reply.replace(/^["']|["']$/g,"");render();}btn.textContent="Ask Chad for a headline";})
    .catch(function(){btn.textContent="Ask Chad for a headline";alert("Chad is temporarily unavailable.");});
}
render();
</script>
</body>
</html>
